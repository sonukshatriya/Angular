 <div class="mb-3">
    <input [(ngModel)]="newtask" type="text" class="form-control" placeholder="Enter new task">
    <button (click)="addtask()" class="btn btn-success mt-2">Add</button>
  </div>
  
  <table class="table table-bordered mt-3">
    
    <thead class="table-dark text-center">
      <tr>
        <th>#</th>
        <th>Task</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let task of tasks; let i = index">
        <td class="text-center">{{ i + 1 }}</td>
        <td>{{ task }}</td>

        <td class="text-center">
          <button (click)="removeTask(i)" class="btn btn-danger btn-sm">Remove</button>
        </td>
      </tr>
    </tbody>

  </table>
